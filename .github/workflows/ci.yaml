name: CI Pipeline

on:
  push:
    paths-ignore:
      - ".github/**"
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        run: |
          docker buildx build \
            -f api/Dockerfile \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.actor }}/url_shortener-api:latest \
            -t ghcr.io/${{ github.actor }}/url_shortener-api:sha-${GITHUB_SHA::7} \
            --push \
            .

          docker buildx build \
            -f redirect-service/Dockerfile \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.actor }}/url_shortener-redirect-service:latest \
            -t ghcr.io/${{ github.actor }}/url_shortener-redirect-service:sha-${GITHUB_SHA::7} \
            --push \
            .
