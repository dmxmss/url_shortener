services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  shortener-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://shortener:shortener@postgres:5432/shortener?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_BASE_URL: http://localhost:8081
      API_ADDR: :8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redirect-service:
    build:
      context: .
      dockerfile: redirect-service/Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://shortener:shortener@postgres:5432/shortener?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      REDIRECT_ADDR: :8081
      CACHE_TTL: 24h
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      FRONTEND_API_UPSTREAM: http://shortener-api:8080
    ports:
      - "3000:80"
    depends_on:
      shortener-api:
        condition: service_started

volumes:
  postgres_data:
