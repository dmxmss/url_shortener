apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: frontend
          image: {{ .Values.image.registry }}/frontend:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: FRONTEND_API_UPSTREAM
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-frontend-config
                  key: FRONTEND_API_UPSTREAM
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
      volumes:
        - name: frontend-config
          configMap:
            name: {{ include "url-shortener.fullname" . }}-frontend-config
