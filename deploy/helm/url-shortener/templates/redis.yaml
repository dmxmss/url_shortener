apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-redis
spec:
  selector:
    app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
{{ toYaml .Values.redis.resources | indent 12 }}

