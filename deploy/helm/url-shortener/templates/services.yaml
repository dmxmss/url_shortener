apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-shortener-api
  labels:
    app.kubernetes.io/component: shortener-api
{{- if .Values.shortenerApi.service.labels }}
{{- toYaml .Values.shortenerApi.service.labels | nindent 4}}
{{- end }}
spec:
  selector:
    app.kubernetes.io/component: shortener-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-redirect-service
  labels:
    app.kubernetes.io/component: redirect-service
{{- if .Values.redirectService.service.labels }}
{{- toYaml .Values.redirectService.service.labels | nindent 4}}
{{- end }}
spec:
  selector:
    app.kubernetes.io/component: redirect-service
  ports:
    - port: 80
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
{{- if .Values.frontend.service.labels }}
{{- toYaml .Values.frontend.service.labels | nindent 4}}
{{- end }}
spec:
  selector:
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
