{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-nats
spec:
  selector:
    app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-nats
  ports:
    - port: 4222
      targetPort: 4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}-nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          ports:
            - containerPort: 4222
{{- end }}

