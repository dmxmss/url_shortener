apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-postgres
spec:
  selector:
    app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "url-shortener.fullname" . }}-postgres
spec:
  serviceName: {{ include "url-shortener.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "url-shortener.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
{{ toYaml .Values.postgresql.resources | indent 12 }}
      volumes:
        - name: init
          configMap:
            name: {{ include "url-shortener.fullname" . }}-migration
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "url-shortener.fullname" . }}-migration
data:
  001_init.sql: |
{{ .Files.Get "files/001_init.sql" | indent 4 }}

