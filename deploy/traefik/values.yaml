deployment:
  replicas: 1

service:
  type: NodePort

ports:
  web:
    port: 80
    exposedPort: 80

providers:
  kubernetesCRD:
    enabled: true

  kubernetesIngress:
    enabled: true

dashboard:
  enabled: true

ingressRoute:
  dashboard:
    enabled: true

logs:
  general:
    level: INFO

additionalArguments:
  - "--api.insecure=true"
