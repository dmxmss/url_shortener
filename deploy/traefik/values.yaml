deployment:
  replicas: 1

service:
  type: NodePort

ports:
  web:
    port: 8000
    exposedPort: 80

providers:
  kubernetesCRD:
    enabled: true

  kubernetesIngress:
    enabled: true

ingressRoute:
  dashboard:
    enabled: true

logs:
  general:
    level: INFO

additionalArguments:
  - "--api.insecure=true"
