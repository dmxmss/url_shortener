apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: url-shortener
data:
  001_init.sql: |
    create table if not exists links (
        id bigserial primary key,
        short_code text not null unique,
        long_url text not null,
        redirect_count bigint not null default 0,
        created_at timestamptz not null default now(),
        last_accessed_at timestamptz
    );
    create index if not exists links_created_at_idx on links(created_at desc);
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: url-shortener
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: url-shortener
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: shortener
            - name: POSTGRES_PASSWORD
              value: shortener
            - name: POSTGRES_DB
              value: shortener
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

